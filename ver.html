<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UrbanFlow — Ver escenario</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #f0f0f0; }

  #header {
    background: #1a3c6e; color: #fff;
    padding: 10px 16px; font-size: 15px;
    display: flex; align-items: center; gap: 10px;
  }
  #header h1 { font-size: 16px; font-weight: bold; flex: 1; }
  #header span { font-size: 11px; opacity: 0.7; white-space: nowrap; }

  #map { height: 100vh; width: 100%; }

  .info-popup { font-size: 14px; line-height: 1.7; min-width: 180px; }
  .info-popup .titulo { font-weight: bold; color: #1a3c6e; font-size: 15px; }
  .badge {
    display: inline-block; background: #e8f0fe;
    border-radius: 4px; padding: 2px 6px; margin: 2px 2px 2px 0;
    font-size: 12px; color: #1a3c6e;
  }

  #error {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #fff; padding: 32px; border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    text-align: center; max-width: 320px;
  }
  #error h2 { color: #dc3545; margin-bottom: 8px; }
  #error p  { color: #666; font-size: 13px; }

  .info-popup { font-size: 13px; line-height: 1.6; min-width: 160px; }
  .info-popup b { color: #1a3c6e; }
</style>
</head>
<body>

<div id="map"></div>
<div id="error">
  <h2>⚠️ Sin datos</h2>
  <p>Este enlace no contiene datos de escenario válidos.<br>
     Genera el QR desde la aplicación UrbanFlow.</p>
</div>

<script>
const emojiMap   = { policia:'🚓', agente:'👮', cono:'🚧', valla:'🧱' };
const nombreMap  = { policia:'Patrulla', agente:'Agente', cono:'Cono', valla:'Valla' };

// Leer datos del hash de la URL (#base64...)
function cargarDatos() {
  const hash = window.location.hash.slice(1);
  if (!hash) return null;
  try {
    const json = decodeURIComponent(escape(atob(hash)));
    return JSON.parse(json);
  } catch (e) {
    console.error('Error al decodificar datos:', e);
    return null;
  }
}

const payload = cargarDatos();

if (!payload || !payload.datos) {
  document.getElementById('error').style.display = 'block';
  document.getElementById('map').style.display   = 'none';
} else {
  const nombre = payload.nombre || 'Escenario';
  const datos  = payload.datos;
  document.title = 'UrbanFlow — ' + nombre;

  const map = L.map('map');
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap', maxZoom: 19
  }).addTo(map);

  const bounds = [];

  datos.forEach(item => {
    if (item.type === 'polyline') {
      const ll = item.latlngs.map(p => [p.lat, p.lng]);
      L.polyline(ll, { color: item.color || '#0000ff', weight: item.weight || 5 }).addTo(map);
      ll.forEach(p => bounds.push(p));

    } else if (item.type === 'marker') {
      const emoji  = emojiMap[item.ufType]  || '📍';
      const tipo   = nombreMap[item.ufType] || item.ufType || 'Corte';
      const latlng = [item.latlng.lat, item.latlng.lng];
      bounds.push(latlng);

      const icon = L.divIcon({
        html: `<div style="font-size:28px;text-align:center;line-height:1;
               filter:drop-shadow(1px 1px 1px rgba(0,0,0,0.3));">${emoji}</div>`,
        iconSize: [32, 32], className: 'custom-icon'
      });

      const marker = L.marker(latlng, { icon }).addTo(map);

      let popupHtml = `<div class="info-popup"><span class="titulo">${emoji} ${tipo}</span><br>`;
      if (item.indicativo) popupHtml += `Indicativo: <b>${item.indicativo}</b><br>`;
      if (item.cps && item.cps.length) {
        popupHtml += `Agentes (${item.cps.length}):<br>`;
        item.cps.forEach((cp, i) => {
          popupHtml += `<span class="badge">Ag.${i+1}: ${cp}</span> `;
        });
        popupHtml += '<br>';
      }
      if (item.instrucciones) popupHtml += `<b>Instrucciones:</b> ${item.instrucciones}<br>`;
      if (item.observaciones) popupHtml += `<b>Observaciones:</b> ${item.observaciones}<br>`;
      popupHtml += '</div>';
      marker.bindPopup(popupHtml);
    }
  });

  if (bounds.length) map.fitBounds(bounds, { padding: [30, 30] });
  else map.setView([36.72, -4.42], 14);
}
</script>
</body>
</html>
